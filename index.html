<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Weather & Stars & Packlist & Question Chatbot</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
  background: linear-gradient(to bottom, #0a0f2b, #1c2b4a, #274360);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Sternenhimmel Hintergrund */
#particles-js {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: auto;
}

/* Chatcontainer – kein Blur */
.chat-container {
  white-space: pre-line;
  width: 100%;
  max-width: 800px;
  height: 620px;
  border-radius: 10px;
  background: transparent;
  box-shadow: none;
  display: flex;
  flex-direction: column;
  z-index: 2;
  position: relative;
  overflow: hidden;
  border: none;
  animation: fadeIn 1s ease-in-out;
  transition: transform 0.4s;
}

/* Eingeklappt */
.chat-container.collapsed {
  transform: translateY(800px);
  pointer-events: none;
}

/* Header */
.chatroom-header {
  background: linear-gradient(135deg, #283e60, #1e2f4d);
  color: #f0f0f0;
  font-weight: 600;
  font-size: 1.4em;
  text-align: center;
  padding: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  box-shadow: inset 0 -2px 8px rgba(255,255,255,0.05);
  letter-spacing: 1px;
}

/* Chat Input */
.chatroom-input {
  border-radius: 0 0 25px 25px;
  border: none;
  padding: 16px;
  font-size: 1.05em;
  outline: none;
  background: rgba(255,255,255,0.12);
  color: #fff;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.25);
  transition: background 0.3s, box-shadow 0.3s;
}
.chatroom-input::placeholder { color: rgba(255,255,255,0.6); }
.chatroom-input:focus { background: rgba(255,255,255,0.2); }

/* Bot Nachrichten */
.chatroom-message.bot {
  background: rgba(100, 150, 250, 0.85);
  color: white;
  border-radius: 25px;
  padding: 12px 16px;
  margin: 10px 0;
  box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
.chatroom-message.bot.speaking {
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(100,150,250,0.5);
}

/* User Nachrichten */
.chatroom-message.user {
  background: rgba(255, 255, 255, 0.85);
  color: #222;
  border-radius: 25px;
  padding: 12px 16px;
  margin: 10px 0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* Scrollbar */
.chatroom-messages::-webkit-scrollbar { width: 8px; }
.chatroom-messages::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.3);
  border-radius: 4px;
}

/* Animation */
@keyframes fadeIn { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }

@media(max-width: 768px) {
  .chat-container { width: 95%; height: 500px; }
}

/* Toggle Button */
.toggle-chat {
  position: fixed;
  bottom: 10px;
  right: 20px;
  z-index: 4;
  padding: 12px 18px;
  background: #1e2f4d;
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 600;
}
</style>
</head>
<body>

<div id="particles-js"></div>
<div class="chat-container"></div>
<button class="toggle-chat">Chat ein/ausklappen</button>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
// Alte Sterne + Raketen Variante
particlesJS('particles-js', {
  particles: {
    number: { value: 700 },
    color: { value: ['#ffffff','#a3c9f1','#88e0ef','#d1caff','#ffcc33','#ff6666'] },
    shape: { type: ['circle', 'triangle'] },
    opacity: { value: 0.8, random: true, anim: { enable: true, speed: 1, opacity_min: 0.2, sync: false } },
    size: { value: 2.5, random: true, anim: { enable: true, speed: 2, size_min: 1, sync: false } },
    line_linked: { enable: false },
    move: { enable: true, speed: 1, direction: 'none', random: true, out_mode: 'out' }
  },
  interactivity: {
    detect_on: 'canvas',
    events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' } },
    modes: { repulse: { distance: 100 }, push: { particles_nb: 6 } }
  },
  retina_detect: true
});

// Chatroom Dummy-Modus
var chatroom = new window.Chatroom({
  host: "https://literate-sniffle-wv4gxrxpwq53gjxp-5005.app.github.dev",
  title: "Weather & Stars & Fuel Chatbot",
  container: document.querySelector(".chat-container"),
  welcomeMessage: "Hello! I am your assistant. I support you with the following actions: WEATHER: Provide a location. Example: 'Weather: <location>' | CLOTHING: Suggest outfit. Example: 'Clothing: <location>' | PACKLIST: Generate packing list. Example: 'Packlist: <location>' | GENERAL QUESTIONS: Ask a question. Example: 'Question: <your input>' | GAS STATION SEARCH: Find gas stations. Example: 'Gasstation: <location>, <fuel>, <radius>' | TRAVEL INFORMATION: Get travel info. Example: 'Travel info: <location>'",
  speechRecognition: "en-US",
  voiceLang: "en-US",
  onBotMessage: (msg, elem) => {
    elem.classList.add('speaking');
    setTimeout(() => elem.classList.remove('speaking'), 400);
  }
});
chatroom.openChat();

// Nachrichten nacheinander senden
welcomeMessages.forEach(msg => {
  chatroom.sendBotMessage(msg);
});
// Toggle-Button Funktion
const toggleBtn = document.querySelector(".toggle-chat");
const chatContainer = document.querySelector(".chat-container");
toggleBtn.addEventListener("click", () => {
  chatContainer.classList.toggle("collapsed");
});
</script>

</body>
</html>
